services:

  app:
    build: .
    # ports: not needed for development since we are using bind mounts and nodemon
    #   - "8080:3000"
    env_file:
      - .env
    environment:
      DB_CLUSTER : ${DB_CLUSTER}
      DB_USER : ${DB_USER}
      DB_PASSWORD : ${DB_PASSWORD}
      DB_NAME : ${DB_NAME}
      JWT_SECRET : ${JWT_SECRET}
      NODE_ENV: development
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
       app:
        condition: service_healthy


  mongo:
    image: mongo:7
    ports:
       - "27017:27017"
    volumes:
       - mongo-data:/data/db
    restart: always

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping: 1})"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
 
volumes:
  mongo-data:

