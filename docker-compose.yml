services:

  app:
    build: .
    ports:
      - "8080:3000"
    env_file:
      - .env
    environment:
      DB_CLUSTER : ${DB_CLUSTER}
      DB_USER : ${DB_USER}
      DB_PASSWORD : ${DB_PASSWORD}
      DB_NAME : ${DB_NAME}
      JWT_SECRET : ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
       - "27017:27017"
    volumes:
       - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping: 1})"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
 
volumes:
  mongo-data:

